<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="aviewport" content="width=device-width, initial-scale=1.0">
  <title>ETHOS_CHAT</title>
  <link rel="stylesheet" href="ethos-chat.css">
</head>

<body>

  <!-- Modal Nom -->
  <div id="nameModal" class="modal">
    <div class="modal-content">
      <h2>Benvingut a ETHOS_CHAT</h2>
      <p>Introdueix el teu nom:</p>
      <input type="text" id="nameInput" placeholder="El teu nom...">
      <button id="nameConfirm">Confirmar</button>
    </div>
  </div>

  <!-- Contenidor principal -->
  <div class="chat-container">

    <!-- Panell esquerra: Xat -->
    <div class="chat-box">
      <h1>ETHOS_CHAT</h1>

      <div id="messages" class="messages"></div>

      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Escriu un missatge...">
        <button id="sendBtn">Enviar</button>
        <button id="clearLocal">Clear local</button>
        <button id="openProfile">Settings</button>
      </div>
    </div>

 <!-- Panell dret: Perfil -->
<div id="profilePanel" class="profile-panel hidden">
  <h2>Perfil ETHOS</h2>

  <p><strong>Nom:</strong> <span id="profileName"></span></p>
  <p><strong>Última connexió:</strong> <span id="profileLast"></span></p>
  <p><strong>Missatges enviats:</strong> <span id="profileCount"></span></p>
  <p><strong>ID intern:</strong> <span id="profileId"></span></p>

  <h3>Temes</h3>
  <button class="theme-btn" data-theme="neon">ETHOS Neon Green</button>
  <button class="theme-btn" data-theme="blue">ETHOS Blue Cyber</button>
  <button class="theme-btn" data-theme="purple">ETHOS Purple Void</button>

  <button id="closeProfile">Tancar</button>
</div>
