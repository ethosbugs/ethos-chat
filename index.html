<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS_CHAT</title>
    <link rel="stylesheet" href="ethos-chat.css">
</head>

<body>

    <!-- MODAL NOM -->
    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h2>Benvingut a ETHOS_CHAT</h2>
            <p>Introdueix el teu nom:</p>
            <input id="nameInput" type="text" placeholder="El teu nom...">
            <button id="nameConfirm">Confirmar</button>
        </div>
    </div>

    <!-- CONTENIDOR PRINCIPAL -->
    <div class="container">

        <!-- XAT -->
        <div class="chat-box">
            <div class="chat-header">
                <h2>ETHOS_CHAT</h2>
                <span id="chatStatus" class="offline">● Offline</span>
            </div>

            <ul id="chatMessages" class="chat-messages"></ul>

            <div class="chat-input-area">
                <input id="chatInput" type="text" placeholder="Escriu un missatge...">
                <button id="chatSend">Enviar</button>
            </div>

            <div class="chat-tools">
                <button id="clearLocal">Clear local</button>
                <button id="settingsBtn">Settings</button>
            </div>
        </div>

        <!-- PANEL SETTINGS -->
        <div id="settingsPanel" class="settings hidden">
            <h2>Perfil ETHOS</h2>

            <img id="profileAvatar" class="avatar" src="" alt="Avatar">

            <p><strong>Nom:</strong> <span id="profileName">-</span></p>
            <p><strong>Última connexió:</strong> <span id="profileLastSeen">-</span></p>
            <p><strong>Missatges enviats:</strong> <span id="profileMessages">-</span></p>
            <p><strong>ID intern:</strong> <span id="profileId">-</span></p>

            <h3>Temes</h3>
            <button class="theme-btn" id="themeGreen">ETHOS Neon Green</button>
            <button class="theme-btn" id="themeBlue">ETHOS Blue Cyber</button>
            <button class="theme-btn" id="themePurple">ETHOS Purple Void</button>

            <button id="closeSettings" class="close-btn">Tancar</button>
        </div>

    </div>

    <script type="module" src="ethos-chat.js"></script>
</body>
</html>
